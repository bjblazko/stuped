<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="preview-styles.css">
    <link rel="stylesheet" href="hljs-github.css" media="(prefers-color-scheme: light)">
    <link rel="stylesheet" href="hljs-github-dark.css" media="(prefers-color-scheme: dark)">
    <script src="highlight.min.js"></script>
    <script src="markdown-it.min.js"></script>
    <script src="mermaid.min.js"></script>
</head>
<body>
    <div id="content"></div>
    <script>
        // Initialize markdown-it with highlight.js integration
        const md = markdownit({
            html: true,
            linkify: true,
            typographer: true,
            highlight: function(str, lang) {
                if (lang === 'mermaid') {
                    return '<pre class="mermaid">' + md.utils.escapeHtml(str) + '</pre>';
                }
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return '<pre class="hljs"><code>' +
                               hljs.highlight(str, { language: lang, ignoreIllegals: true }).value +
                               '</code></pre>';
                    } catch (_) {}
                }
                return '<pre class="hljs"><code>' + md.utils.escapeHtml(str) + '</code></pre>';
            }
        });

        // Detect dark mode
        function isDarkMode() {
            return window.matchMedia('(prefers-color-scheme: dark)').matches;
        }

        // Initialize mermaid
        mermaid.initialize({
            startOnLoad: false,
            theme: isDarkMode() ? 'dark' : 'default',
            securityLevel: 'loose',
            fontFamily: '-apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif'
        });

        // Listen for dark mode changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            mermaid.initialize({
                startOnLoad: false,
                theme: e.matches ? 'dark' : 'default',
                securityLevel: 'loose',
                fontFamily: '-apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif'
            });
            // Re-render current content
            if (window._lastMarkdown) {
                renderMarkdown(window._lastMarkdown);
            }
        });

        // Mermaid render counter for unique IDs
        let mermaidCounter = 0;

        async function renderMarkdown(text) {
            window._lastMarkdown = text;

            // Save scroll position
            const scrollY = window.scrollY;

            // Render markdown to HTML
            const html = md.render(text);
            document.getElementById('content').innerHTML = html;

            // Find and render mermaid diagrams
            const mermaidElements = document.querySelectorAll('pre.mermaid');
            if (mermaidElements.length > 0) {
                for (const el of mermaidElements) {
                    const graphDefinition = el.textContent;
                    const id = 'mermaid-' + (mermaidCounter++);
                    try {
                        const { svg } = await mermaid.render(id, graphDefinition);
                        el.innerHTML = svg;
                        el.classList.add('mermaid-rendered');
                    } catch (e) {
                        el.innerHTML = '<div class="mermaid-error">Mermaid Error: ' +
                                       e.message + '</div><pre><code>' +
                                       graphDefinition + '</code></pre>';
                    }
                }
            }

            // Restore scroll position
            window.scrollTo(0, scrollY);
        }

        // Signal that template is ready
        window._templateReady = true;
    </script>
</body>
</html>
