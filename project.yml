name: Stuped
options:
  bundleIdPrefix: com.huepattl
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "26.4"
  generateEmptyDirectories: true

packages:
  HighlighterSwift:
    url: https://github.com/smittytone/HighlighterSwift.git
    from: "1.0.0"

targets:
  Stuped:
    type: application
    platform: macOS
    sources:
      - path: Stuped
        excludes:
          - Resources
      - path: Stuped/Resources
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.huepattl.Stuped
        PRODUCT_NAME: Stuped
        MARKETING_VERSION: "0.5.3"
        CURRENT_PROJECT_VERSION: "8"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        INFOPLIST_FILE: Stuped/Info.plist
        CODE_SIGN_ENTITLEMENTS: Stuped/Stuped.entitlements
        GENERATE_INFOPLIST_FILE: false
        ENABLE_HARDENED_RUNTIME: true
    dependencies:
      - package: HighlighterSwift
        product: Highlighter
    entitlements:
      path: Stuped/Stuped.entitlements
      properties:
        com.apple.security.app-sandbox: false
